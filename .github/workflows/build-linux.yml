name: Build Linux (AppImage)

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        node-version: [18]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm pkg set version="$VERSION"

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Build Electron app (AppImage)
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload x64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-x64
          path: dist/*x86_64*.AppImage
          if-no-files-found: error

      - name: Upload arm64 AppImage
        uses: actions/upload-artifact@v4
        with:
          name: Claude-Usage-Widget-linux-arm64
          path: dist/*arm64*.AppImage
          if-no-files-found: error

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          files: |
            dist/*x86_64*.AppImage
            dist/*arm64*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
